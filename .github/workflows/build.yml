name: Build, Test, and Release

on:
  workflow_dispatch: # Manual trigger only to save resources
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Cosmopolitan archives
      id: cache-archives
      uses: actions/cache@v4
      with:
        path: tmp
        key: cosmo-archives-4.0.2

    - name: Cache Cosmopolitan extracted
      id: cache-extracted
      uses: actions/cache@v4
      with:
        path: cosmo
        key: cosmo-extracted-4.0.2

    - name: Build and Test
      run: |
        make test

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          curly.exe
          curly
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
